name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  IMAGE_NAME: pwbsladek/waitfor
  GO_IMAGE: dhi.io/golang:1.26-dev
  RUNTIME_IMAGE: dhi.io/static:20250419

jobs:
  image-test:
    name: Build and smoke test image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DHI
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: waitfor:test
          build-args: |
            GO_IMAGE=${{ env.GO_IMAGE }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            VERSION=test
            COMMIT=${{ github.sha }}

      - name: Smoke test
        run: docker run --rm waitfor:test --help

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: image-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to DHI
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_IMAGE=${{ env.GO_IMAGE }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
