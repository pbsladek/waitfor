name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  IMAGE_NAME: pwbsladek/waitfor
  GO_IMAGE: dhi.io/golang:1.26-dev
  RUNTIME_IMAGE: dhi.io/static:20250419

jobs:
  image-test:
    name: Build and smoke test image
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DHI
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: waitfor:test-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
          build-args: |
            GO_IMAGE=${{ env.GO_IMAGE }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            VERSION=test
            COMMIT=${{ github.sha }}

      - name: Smoke test
        run: docker run --rm --platform ${{ matrix.platform }} waitfor:test-${{ matrix.suffix }} --help

  publish-platform:
    name: Publish image (${{ matrix.platform }})
    needs: image-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            suffix: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to DHI
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
          build-args: |
            GO_IMAGE=${{ env.GO_IMAGE }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: publish-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          digests=()
          for digest in /tmp/digests/*; do
            digests+=("${IMAGE_NAME}@sha256:$(basename "${digest}")")
          done

          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "${tag}")
          done < <(jq -r '.tags[]' <<< "${METADATA_JSON}")

          docker buildx imagetools create "${tag_args[@]}" "${digests[@]}"

      - name: Inspect image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.version }}"
