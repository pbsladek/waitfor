name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Black-box binary integration tests
        run: make test-integration

  kubernetes-integration:
    name: Kubernetes Binary Integration
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          wait: 120s

      - name: Kubernetes black-box binary integration tests
        run: make test-integration-k8s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - test
      - kubernetes-integration
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Build
        run: go build -trimpath -o "dist/waitfor-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/waitfor
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waitfor-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/waitfor-${{ matrix.goos }}-${{ matrix.goarch }}
